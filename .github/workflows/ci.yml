name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Fetch trial corpus (synthetic/public; not committed)
        run: |
          mkdir -p backend/data
          curl -fsSL -o backend/data/trials.csv \
            "https://github.com/PinkSheepDog/find-my-trial/releases/download/corpus-v1/trials.csv"
          wc -l backend/data/trials.csv

      - name: Run tests + synthetic-EHR benchmark gate
        working-directory: backend
        run: python -m pytest -q
